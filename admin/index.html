<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博客管理</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #fff;
    --text: #1a1a1a;
    --muted: #888;
    --border: #eee;
    --accent: #0071e3;
    --danger: #ff3b30;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* 登录页 */
  .login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .login-card {
    background: var(--card);
    border-radius: 20px;
    padding: 48px 40px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .login-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .login-card p { color: var(--muted); margin-bottom: 28px; font-size: 14px; }

  .login-card input {
    width: 100%; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 16px; font-family: inherit;
    outline: none; margin-bottom: 16px; transition: border-color 0.2s;
  }
  .login-card input:focus { border-color: var(--accent); }

  .login-card button {
    width: 100%; padding: 12px; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: opacity 0.2s;
  }
  .login-card button:hover { opacity: 0.9; }
  .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-card .error { color: var(--danger); font-size: 13px; margin-top: 8px; min-height: 20px; }

  /* 设置页面 */
  .setup-card {
    background: var(--card);
    border-radius: 20px;
    padding: 48px 40px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 500px;
  }
  .setup-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .setup-card p { color: var(--muted); margin-bottom: 24px; font-size: 14px; line-height: 1.7; }
  .setup-card label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; margin-top: 16px; }
  .setup-card input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-family: inherit; outline: none; }
  .setup-card input:focus { border-color: var(--accent); }
  .setup-card button { margin-top: 24px; }
  .setup-card .small { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .setup-card a { color: var(--accent); }

  /* 管理主界面 */
  .admin-screen { display: none; }
  .admin-screen.active { display: block; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,250,250,0.8);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
  }

  .header-inner {
    max-width: 900px; margin: 0 auto; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo { font-size: 20px; font-weight: 700; }
  .header-actions { display: flex; gap: 12px; align-items: center; }

  .btn {
    padding: 8px 18px; border-radius: 8px; font-size: 14px;
    font-weight: 500; cursor: pointer; border: none; font-family: inherit;
    transition: all 0.2s;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: 0.9; }

  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover:not(:disabled) { background: #f5f5f5; }

  .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); }
  .btn-danger:hover:not(:disabled) { background: #fff0ef; }

  .btn-sm { padding: 4px 12px; font-size: 12px; }

  main { max-width: 900px; margin: 0 auto; padding: 32px 24px 80px; }

  .section-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin-bottom: 16px;
  }

  .post-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 8px; box-shadow: var(--shadow); gap: 16px;
  }

  .post-row .title {
    font-weight: 600; font-size: 15px; flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .post-row .meta { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .post-row .actions { display: flex; gap: 6px; flex-shrink: 0; }

  .unsaved-badge {
    background: #ff9500; color: #fff; font-size: 11px; padding: 2px 8px;
    border-radius: 8px; margin-left: 8px; font-weight: 500;
  }

  .status-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 24px; background: #fffbe6; border-bottom: 1px solid #ffe58f;
    font-size: 13px; color: #8c6d00; justify-content: center;
  }
  .status-bar button { margin-left: 8px; }

  /* 编辑器弹窗 */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
    z-index: 200; align-items: center; justify-content: center; padding: 24px;
  }
  .overlay.active { display: flex; }

  .editor {
    background: var(--card); border-radius: 20px; padding: 36px;
    width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .editor h2 { font-size: 22px; margin-bottom: 24px; }
  .editor label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .editor input, .editor textarea {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 15px; font-family: inherit; outline: none;
    margin-bottom: 20px; transition: border-color 0.2s;
  }
  .editor input:focus, .editor textarea:focus { border-color: var(--accent); }
  .editor textarea { min-height: 200px; resize: vertical; line-height: 1.6; }
  .editor .hint { font-size: 12px; color: var(--muted); margin-top: -16px; margin-bottom: 20px; }
  .editor .btns { display: flex; gap: 10px; justify-content: flex-end; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }

  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: 10px;
    font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .toast.error { background: var(--danger); }
</style>
</head>
<body>

<!-- 登录界面 -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>🔐 博客管理</h1>
    <p>请输入管理密码</p>
    <input type="password" id="passwordInput" placeholder="管理密码" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()" id="loginBtn">登 录</button>
    <p class="error" id="loginError"></p>
  </div>
</div>

<!-- 首次设置界面（GitHub Token 未配置时显示） -->
<div class="login-screen" id="setupScreen" style="display:none">
  <div class="setup-card">
    <h1>⚙️ 首次设置</h1>
    <p>要使用一键发布功能，需要配置 GitHub Personal Access Token。</p>
    <p>1. 打开 <a href="https://github.com/settings/tokens/new?scopes=repo&description=blog-admin" target="_blank">这个链接</a> 创建 Token</p>
    <p>2. 选择 <strong>repo</strong> 权限，点 Generate token</p>
    <p>3. 复制生成的 Token 粘贴到下面</p>
    <label>GitHub Token</label>
    <input type="password" id="ghTokenInput" placeholder="ghp_xxxxxxxxxxxx">
    <div class="small">Token 只保存在你的浏览器本地，不会上传到任何服务器</div>
    <label>仓库路径</label>
    <input type="text" id="ghRepoInput" value="johnwiiick/blog" placeholder="用户名/仓库名">
    <label>管理密码（修改默认密码）</label>
    <input type="password" id="adminPwInput" placeholder="设置管理密码">
    <button class="btn btn-primary" onclick="saveSetup()" style="width:100%">保 存 并 开 始</button>
  </div>
</div>

<!-- 管理界面 -->
<div class="admin-screen" id="adminScreen">
  <div class="status-bar" id="statusBar" style="display:none">
    <span>⚠️ 有未同步的更改</span>
    <button class="btn btn-sm btn-primary" onclick="pushToGithub()">一键发布到网站</button>
  </div>
  <header>
    <div class="header-inner">
      <span class="logo">📝 博客管理</span>
      <div class="header-actions">
        <span style="font-size:12px;color:var(--muted)" id="syncStatus"></span>
        <a href="../" class="btn btn-outline">查看博客</a>
        <button class="btn btn-outline" onclick="pushToGithub()" id="pushBtn">发布到网站</button>
        <button class="btn btn-primary" onclick="openEditor()">+ 写文章</button>
        <button class="btn btn-outline" id="logoutBtn" onclick="logout()">退出</button>
      </div>
    </div>
  </header>

  <main>
    <div class="section-title">文章列表</div>
    <div id="postList"></div>
  </main>
</div>

<!-- 编辑器弹窗 -->
<div class="overlay" id="editorOverlay">
  <div class="editor">
    <h2 id="editorTitle">写新文章</h2>
    <label>标题</label>
    <input type="text" id="postTitle" placeholder="文章标题">
    <label>标签（用逗号分隔）</label>
    <input type="text" id="postTags" placeholder="技术, 生活, 随笔">
    <label>内容（支持 HTML）</label>
    <div class="hint">可直接写文字，每段用 &lt;p&gt;段落&lt;/p&gt; 包裹。支持 &lt;h2&gt;标题&lt;/h2&gt;、&lt;code&gt;代码&lt;/code&gt; 等。</div>
    <textarea id="postContent" placeholder="开始写作..."></textarea>
    <div class="btns">
      <button class="btn btn-outline" onclick="closeEditor()">取消</button>
      <button class="btn btn-primary" id="saveBtn" onclick="savePost()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../posts.js"></script>
<script>
  // ============ 配置 ============
  let GH_TOKEN = localStorage.getItem('blog_gh_token') || '';
  let GH_REPO = localStorage.getItem('blog_gh_repo') || 'johnwiiick/blog';
  let ADMIN_PASSWORD = localStorage.getItem('blog_admin_pw') || 'admin123';

  // ============ 状态 ============
  let editingId = null;
  let dirty = false;       // 是否有未推送的更改
  let _posts = [...(posts || [])];  // 工作副本
  let _postsSha = null;    // GitHub 上的文件 SHA

  // ============ 页面初始化 ============
  function init() {
    if (GH_TOKEN && ADMIN_PASSWORD) {
      // 已配置
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
    } else {
      // 首次使用，显示设置页
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('setupScreen').style.display = 'flex';
      document.getElementById('adminPwInput').value = ADMIN_PASSWORD === 'admin123' ? '' : ADMIN_PASSWORD;
      document.getElementById('ghTokenInput').value = GH_TOKEN;
      document.getElementById('ghRepoInput').value = GH_REPO;
    }

    // 检查是否已登录
    if (sessionStorage.getItem('blog_admin')) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('adminScreen').classList.add('active');
      fetchLatestPosts().then(() => renderPostList());
    }
  }

  // ============ 设置 ============
  function saveSetup() {
    const token = document.getElementById('ghTokenInput').value.trim();
    const repo = document.getElementById('ghRepoInput').value.trim();
    const pw = document.getElementById('adminPwInput').value.trim();

    if (!token) { showToast('请输入 GitHub Token', true); return; }
    if (!repo) { showToast('请输入仓库路径', true); return; }

    GH_TOKEN = token;
    GH_REPO = repo;
    ADMIN_PASSWORD = pw || 'admin123';

    localStorage.setItem('blog_gh_token', GH_TOKEN);
    localStorage.setItem('blog_gh_repo', GH_REPO);
    localStorage.setItem('blog_admin_pw', ADMIN_PASSWORD);

    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    showToast('设置已保存，请登录');
  }

  // ============ 登录 ============
  function login() {
    const pw = document.getElementById('passwordInput').value;
    const btn = document.getElementById('loginBtn');

    if (pw === ADMIN_PASSWORD) {
      btn.disabled = true;
      btn.textContent = '加载中...';

      sessionStorage.setItem('blog_admin', '1');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').classList.add('active');

      fetchLatestPosts().then(() => renderPostList()).finally(() => {
        btn.disabled = false;
        btn.textContent = '登 录';
      });
    } else {
      document.getElementById('loginError').textContent = '密码错误';
    }
  }

  function logout() {
    sessionStorage.removeItem('blog_admin');
    if (dirty) {
      if (!confirm('有未发布的更改，确定退出吗？')) return;
    }
    location.reload();
  }

  // ============ GitHub API ============
  async function githubApi(path, options = {}) {
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`, {
      ...options,
      headers: {
        'Authorization': `token ${GH_TOKEN}`,
        'Accept': 'application/vnd.github.v3+json',
        ...options.headers
      }
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `API error ${res.status}`);
    }
    return res.json();
  }

  async function fetchLatestPosts() {
    if (!GH_TOKEN) return;
    try {
      const file = await githubApi('posts.js');
      _postsSha = file.sha;
      const content = atob(file.content);
      // 提取 posts 数组
      const match = content.match(/var\s+posts\s*=\s*(\[[\s\S]*\])\s*;/);
      if (match) {
        _posts = JSON.parse(match[1]);
        posts.length = 0;
        _posts.forEach(p => posts.push(p));
      }
      dirty = false;
      updateDirtyUI();
      document.getElementById('syncStatus').textContent = '✅ 已同步';
    } catch (e) {
      console.log('Fetch posts from GitHub failed, using local copy:', e.message);
      _posts = [...(posts || [])];
      document.getElementById('syncStatus').textContent = '📋 本地模式';
    }
  }

  async function pushToGithub() {
    if (!GH_TOKEN) {
      showToast('请先配置 GitHub Token', true);
      return;
    }

    const btn = document.getElementById('pushBtn');
    btn.disabled = true;
    btn.textContent = '发布中...';

    try {
      // 先刷新 SHA
      try {
        const file = await githubApi('posts.js');
        _postsSha = file.sha;
      } catch (e) {
        // 文件可能不存在
        _postsSha = null;
      }

      const content = 'var posts = ' + JSON.stringify(_posts, null, 2) + ';';
      const base64 = btoa(unescape(encodeURIComponent(content)));

      const body = {
        message: 'Update posts',
        content: base64,
        branch: 'main'
      };
      if (_postsSha) body.sha = _postsSha;

      const result = await githubApi('posts.js', {
        method: 'PUT',
        body: JSON.stringify(body)
      });

      _postsSha = result.content.sha;
      dirty = false;
      updateDirtyUI();
      document.getElementById('syncStatus').textContent = '✅ 已同步';
      showToast('🎉 已发布到网站！稍等几十秒即可在博客首页看到更新');
    } catch (e) {
      showToast('发布失败: ' + e.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = '发布到网站';
    }
  }

  // ============ 文章管理 ============
  function generateId(title) {
    const slug = title.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '-').replace(/^-|-$/g, '') || 'post';
    return slug + '-' + Date.now().toString(36);
  }

  function openEditor(id) {
    editingId = id || null;
    document.getElementById('editorOverlay').classList.add('active');

    if (id) {
      const p = _posts.find(p => p.id === id);
      if (p) {
        document.getElementById('editorTitle').textContent = '编辑文章';
        document.getElementById('postTitle').value = p.title;
        document.getElementById('postTags').value = (p.tags || []).join(', ');
        document.getElementById('postContent').value = p.content;
        document.getElementById('saveBtn').textContent = '更新';
      }
    } else {
      document.getElementById('editorTitle').textContent = '写新文章';
      document.getElementById('postTitle').value = '';
      document.getElementById('postTags').value = '';
      document.getElementById('postContent').value = '';
      document.getElementById('saveBtn').textContent = '发布';
    }
  }

  function closeEditor() {
    document.getElementById('editorOverlay').classList.remove('active');
    editingId = null;
  }

  function savePost() {
    const title = document.getElementById('postTitle').value.trim();
    const tagsRaw = document.getElementById('postTags').value.trim();
    const content = document.getElementById('postContent').value.trim();

    if (!title || !content) {
      showToast('标题和内容不能为空', true);
      return;
    }

    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

    if (editingId) {
      const p = _posts.find(p => p.id === editingId);
      if (p) {
        p.title = title;
        p.tags = tags;
        p.content = content;
        p.updatedAt = Date.now();
      }
    } else {
      _posts.unshift({
        id: generateId(title),
        title,
        content,
        tags,
        createdAt: Date.now(),
        updatedAt: Date.now()
      });
    }

    // 同步到全局 posts（前端预览用）
    posts.length = 0;
    _posts.forEach(p => posts.push(p));

    dirty = true;
    updateDirtyUI();
    closeEditor();
    renderPostList();
    showToast(editingId ? '文章已更新（待发布）' : '文章已保存（待发布）');
  }

  function deletePost(id) {
    if (!confirm('确定要删除这篇文章吗？此操作不可撤销。')) return;
    _posts = _posts.filter(p => p.id !== id);
    posts.length = 0;
    _posts.forEach(p => posts.push(p));
    dirty = true;
    updateDirtyUI();
    renderPostList();
    showToast('文章已删除（待发布）');
  }

  function renderPostList() {
    const el = document.getElementById('postList');
    if (!_posts || _posts.length === 0) {
      el.innerHTML = '<div class="empty-state">还没有文章，点击上方"+ 写文章"开始创作</div>';
      return;
    }

    el.innerHTML = _posts
      .sort((a, b) => b.createdAt - a.createdAt)
      .map(p => {
        const d = new Date(p.createdAt);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        return `
          <div class="post-row">
            <span class="title">${p.title}</span>
            <span class="meta">${dateStr}</span>
            <div class="actions">
              <button class="btn btn-outline btn-sm" onclick="openEditor('${p.id}')">编辑</button>
              <button class="btn btn-danger btn-sm" onclick="deletePost('${p.id}')">删除</button>
            </div>
          </div>
        `;
      }).join('');
  }

  function updateDirtyUI() {
    const bar = document.getElementById('statusBar');
    if (dirty) {
      bar.style.display = 'flex';
    } else {
      bar.style.display = 'none';
    }
  }

  function showToast(msg, isError) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => toast.className = 'toast', 2500);
  }

  // ============ 事件绑定 ============
  document.getElementById('editorOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeEditor();
  });

  init();
</script>
</body>
</html>
